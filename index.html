<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Menu - Fandom Squad</title>
</head>
<body>

    <header class="header">
        <h1 class="pagename">Welcome to Fandom-Squad</h1>
    </header>

    <div class="main-container">
        <aside class="starlight">
            <h2 class="novedad">novedad</h2>
            <div class="starlight-logo">
                <img src="Textures/Section.png" alt="Starlight Logo" width="350" height="350">
                <p class="starlight-logo-text">Starlight: A.T.P</p>
            </div>
            <div class="plants-reference">
                <img src="Textures/Plants.png" alt="Plants Reference" width="422" height="260">
            </div>
            <p class="question">¿Te gusta dibujo y personajes originales?</p>
            <a href="#" class="visit-link">Visita Starlight!</a>
        </aside>

        <main class="side-menu">
            <h2 class="recomendation">Recomendaciones</h2>
            
            <div class="gallery-grid">
                
                <section class="book-item la-daga">
                    <img src="https://blogliterario.com/wp-content/uploads/2025/03/la-daga-sin-nombre-400.jpg" alt="La Daga Sin Nombre" width="200" height="318">
                </section>

                <section class="book-item norte">
                    <img src="https://tse1.mm.bing.net/th/id/OIP.pGVJWtDW57j-Qsj5MrrmjaAAAA?rs=1&pid=ImgDetMain" alt="Los Hombres del Norte" width="200" height="318">
                </section>

                <section class="book-item verano">
                    <img src="https://img.wattpad.com/cover/255641533-256-k350011.jpg" alt="Hasta que el Verano se Acabe" width="200" height="318">
                </section>

                <section class="book-item jackson">
                    <img src="https://github.com/noeleduardoher-droid/projecto-conjunto-2/blob/main/image9.png?raw=true" alt="Percy Jackson" width="200" height="318">
                </section>

                <section class="book-item assassins">
                    <img src="https://tecniciencia.com/cdn/shop/files/9788445006566_01bfef16-aa4c-4568-8a1a-a7d79818052a.jpg?v=1747622076" alt="Assassin's Creed: Brotherhood" width="200" height="318">
                </section>

                <section class="book-item dc">
                    <img src="https://content.eccediciones.com/productos/3356/cubierta_kingdom_come_deluxe_montaje_web.jpg" alt="DC Kingdom Come" width="200" height="318">
                </section>

                <section class="book-item batman">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2V4l/AVvXsEhkGfs1eAR4d8ZJYc7GJnPsLP-krVcZg0E0J-9bE82UyKuxwt6XYBHdDREEzMPHP8k_-ypwoT9ADpRm0WJabRQLhyMvVkyIveChv-WCZSzl70NuHo73KF8rtEGJLMDLxV1_tHIIuNpSw/s1600/DGOZL5gWAAE8yL1.jpg" alt="Batman White Knight" width="200" height="318">
                </section>

                <section class="book-item avatar">
                    <img src="https://i.pinimg.com/736x/fc/3f/9c/fc3f9c0dcfe658b19f1b6bd95fed8cc0.jpg" alt="Avatar: La Busqueda" width="200" height="318">
                </section>

                <section class="book-item hellboy">
                    <img src="https://actualitte.com/uploads/images/hellboy_20into_the_20silent_20sea-495deb4a-a4ea-5ca109e00656.jpg" alt="Hellboy: Into The Silent Sea" width="200" height="318">
                </section>

                <section class="book-item godzilla">
                    <img src="https://www.hugozapata.com.ar/wp-content/uploads/2021/11/godzilla.jpg" alt="Godzilla" width="200" height="318">
                </section>

            </div> </main>
    </div> </body>
</html>
